name: Deploy site-worker-mobile

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm install
      - run: npm run build

      - name: Setup SSH keys
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/dev_key
          echo "${{ secrets.UAT_EC2_SSH_KEY }}" > ~/.ssh/uat_key
          chmod 600 ~/.ssh/dev_key ~/.ssh/uat_key
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts
          ssh-keyscan -H 3.34.165.192 >> ~/.ssh/known_hosts

      - name: Deploy to dev (workerm.work365.com)
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/dev_key" \
            dist/ ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:${{ secrets.EC2_TARGET_DIR }}/

      - name: Deploy to UAT (worker.work365.com)
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/uat_key" \
            dist/ root@3.34.165.192:/var/www/site-worker-mobile/

      - name: Reload Nginx (dev + UAT)
        run: |
          ssh -i ~/.ssh/dev_key ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} "sudo systemctl reload nginx || true"
          ssh -i ~/.ssh/uat_key root@3.34.165.192 "systemctl reload nginx"
